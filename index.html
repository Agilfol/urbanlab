<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Escape Room UrbanLab</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 3px solid #ffcc00; padding: 30px; border-radius: 15px; text-align: center; background: #222; max-width: 400px; }
        h2 { color: #ffcc00; }
        input { padding: 10px; font-size: 1.2em; width: 100px; text-align: center; margin: 20px 0; border-radius: 5px; border: none; }
        button { background: #ffcc00; color: black; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔓 ESCAPE ROOM</h2>
        <p>Resuelve el reto de esfuerzos y escalas:</p>
        <input type="text" id="code" placeholder="???">
        <br>
        <button onclick="check()">VERIFICAR</button>
        <div id="result"></div>
    </div>
    <script>
        function check() {
            var val = document.getElementById('code').value;
            var res = document.getElementById('result');
            if(val === "113") {
                res.innerHTML = "✅ CORRECTO. Acceso concedido.";
                res.style.color = "#00ff00";
            } else {
                res.innerHTML = "❌ INCORRECTO.";
                res.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
