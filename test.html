<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test IA UrbanLab</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #3498db; padding: 25px; border-radius: 12px; text-align: center; background: #1e1e1e; max-width: 450px; }
        #pregunta { font-size: 1.2em; margin: 20px 0; color: #3498db; min-height: 60px; }
        button { background: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🤖 SIMULADOR IA URBANLAB</h3>
        <p id="pregunta">Pulsa el botón para generar una pregunta técnica</p>
        <button onclick="next()">NUEVA PREGUNTA</button>
    </div>
    <script>
        function next() {
            const qs = [
                "¿Qué es el esfuerzo de tracción en una pieza impresa?",
                "¿Cómo influye la escala 1:20 en una medida de 10cm?",
                "¿Por qué es importante la orientación de las capas?",
                "Define el esfuerzo de compresión en un pilar.",
                "¿Qué ocurre si no usas soportes en voladizos?"
            ];
            document.getElementById('pregunta').innerText = qs[Math.floor(Math.random() * qs.length)];
        }
    </script>
</body>
</html>
