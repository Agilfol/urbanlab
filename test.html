<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Técnico UrbanLab</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #3498db; padding: 30px; border-radius: 15px; background: #1e1e1e; max-width: 500px; width: 90%; text-align: center; }
        h3 { color: #3498db; margin-top: 0; }
        #question { font-size: 1.1em; margin-bottom: 20px; min-height: 50px; }
        .options { display: grid; gap: 10px; }
        button.opt { background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: left; }
        button.opt:hover { background: #444; }
        #feedback { margin-top: 20px; font-weight: bold; min-height: 25px; }
        button#next-btn { margin-top: 20px; background: #3498db; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🤖 SIMULADOR DE EXAMEN IA</h3>
        <div id="question">Cargando pregunta...</div>
        <div class="options" id="options-container"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="loadQuestion()">SIGUIENTE PREGUNTA</button>
    </div>

    <script>
        const questions = [
            { q: "¿Qué ocurre si las capas de impresión son perpendiculares al esfuerzo de tracción?", a: ["Se rompe fácilmente por las capas", "Es mucho más resistente", "No afecta en nada"], c: 0 },
            { q: "En escala 1:20, una medida real de 2 metros en el plano son:", a: ["10 cm", "5 cm", "20 cm"], c: 0 },
            { q: "¿Cuál es el esfuerzo principal que soporta un pilar?", a: ["Tracción", "Torsión", "Compresión"], c: 2 },
            { q: "¿Qué software se usa para preparar el archivo G-Code?", a: ["AutoCAD", "Laminador (Slicer)", "Excel"], c: 1 }
        ];

        let currentQ = {};

        function loadQuestion() {
            document.getElementById('feedback').innerText = "";
            document.getElementById('next-btn').style.display = "none";
            currentQ = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('question').innerText = currentQ.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            currentQ.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "opt";
                btn.innerText = opt;
                btn.onclick = () => check(index);
                container.appendChild(btn);
            });
        }

        function check(index) {
            const f = document.getElementById('feedback');
            if(index === currentQ.c) {
                f.innerText = "✅ ¡CORRECTO!";
                f.style.color = "#2ecc71";
            } else {
                f.innerText = "❌ INCORRECTO. Inténtalo de nuevo.";
                f.style.color = "#e74c3c";
            }
            document.getElementById('next-btn').style.display = "inline-block";
        }
